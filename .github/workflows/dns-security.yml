name: DNS Security Check

# $0 dogfood: scans blackveilsecurity.com with bv-mcp's OWN scanner (no paid action).
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

concurrency:
  group: dns-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dogfood-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore wasm-pack binary
        id: wasmpack
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-bin-0.13.1
      - name: Install wasm-pack
        if: steps.wasmpack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.13.1 --locked
      - run: npm run build:wasm
      - run: npm run build
      - name: Dogfood scan (blackveilsecurity.com, min grade B)
        env:
          DOGFOOD_DOMAIN: blackveilsecurity.com
          DOGFOOD_MIN_GRADE: B
        run: node scripts/ci/dogfood-scan.mjs
