name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly CodeQL re-scan of main so new query packs run against existing code.
    - cron: '30 5 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: 8.30.1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least-privilege default token; the CodeQL job declares its own elevated perms.
permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret & PII scan
    # gitleaks needs an exact base..head range; scheduled runs have none.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tar.gz
          gitleaks version

      - name: Run gitleaks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "::error::Unable to compute an exact gitleaks scan range."
            exit 1
          fi
          RANGE="${BASE_SHA}..${HEAD_SHA}"
          echo "Scanning range: $RANGE"
          gitleaks detect --config=.gitleaks.toml --source=. --redact=100 --verbose --exit-code 1 --no-banner --log-opts="$RANGE"

  dependency-audit:
    name: Dependency audit
    # PR/push only; the weekly schedule is for CodeQL.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Audit for moderate+ vulnerabilities
        run: npm audit --audit-level=moderate

  codeql:
    name: CodeQL analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Root Worker + packages/dns-checks (single JS/TS tree); full suite.
          - language: javascript-typescript
            build-mode: none
            queries: security-extended
          # Scans the repo's own workflows for injection/misconfig; default suite.
          - language: actions
            build-mode: none
            queries: ''
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: ${{ matrix.queries }}
          # Scope analysis to the deployed surface (src/ + packages/); excludes
          # test fixtures + dev scripts, whose only findings are false positives.
          config-file: ./.github/codeql/codeql-config.yml
          dependency-caching: true

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
