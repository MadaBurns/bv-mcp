name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly CodeQL re-scan of main so new query packs run against existing code.
    - cron: '30 5 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: 8.30.1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secret-scan:
    name: Secret & PII scan
    # gitleaks needs an exact base..head range; scheduled runs have none.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tar.gz
          gitleaks version

      - name: Run gitleaks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "::error::Unable to compute an exact gitleaks scan range."
            exit 1
          fi
          RANGE="${BASE_SHA}..${HEAD_SHA}"
          echo "Scanning range: $RANGE"
          gitleaks detect --config=.gitleaks.toml --source=. --redact=100 --verbose --exit-code 1 --no-banner --log-opts="$RANGE"

  dependency-audit:
    name: Dependency audit
    # PR/push only; the weekly schedule is for CodeQL.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Audit for moderate+ vulnerabilities
        run: npm audit --audit-level=moderate

  codeql:
    name: CodeQL analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Root Worker + packages/dns-checks (single JS/TS tree); full suite.
          - language: javascript-typescript
            build-mode: none
            queries: security-extended
          # Scans the repo's own workflows for injection/misconfig; default suite.
          - language: actions
            build-mode: none
            queries: ''
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: ${{ matrix.queries }}
          dependency-caching: true

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
