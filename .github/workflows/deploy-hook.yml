name: Deploy Hook

# Trigger via:
#   1. GitHub Actions UI → "Run workflow" button
#   2. Webhook: POST https://api.github.com/repos/MadaBurns/bv-mcp/dispatches
#      Headers: Authorization: Bearer <GITHUB_TOKEN>, Accept: application/vnd.github+json
#      Body: { "event_type": "deploy", "client_payload": { "environment": "production" } }
#   3. curl one-liner:
#      curl -X POST https://api.github.com/repos/MadaBurns/bv-mcp/dispatches \
#        -H "Authorization: Bearer $GITHUB_TOKEN" \
#        -H "Accept: application/vnd.github+json" \
#        -d '{"event_type":"deploy"}'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      dry_run:
        description: 'Dry run (build + test only, skip deploy)'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [deploy]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Pre-deploy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build workspace package
        run: npm -w packages/dns-checks run build

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build WASM
        run: npm run build:wasm

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test


  deploy:
    name: Deploy to Cloudflare Workers
    needs: validate
    if: ${{ !(github.event.inputs.dry_run == 'true') }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      # CI deploy is intentionally fenced off — see CLAUDE.md "Deployment".
      # Production deploys are MANUAL via `npm run deploy:prod`, which injects private
      # bindings from the gitignored `.dev/wrangler.deploy.jsonc`. Those overrides are
      # unavailable in CI, so a CI deploy of the public config would ship a worker
      # missing all KV/D1/R2/Analytics/service bindings. Do not remove this guard without
      # first wiring private-config injection from an encrypted secret.
      - name: CI deploy is not supported (use npm run deploy:prod)
        run: |
          echo "::error::CI deploy is disabled — deploy manually with 'npm run deploy:prod'. Private bindings live in the gitignored .dev/ overrides and are unavailable in CI."
          exit 1

      - name: Check Cloudflare token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN not configured"
            exit 1
          fi

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build workspace package
        run: npm -w packages/dns-checks run build

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build WASM
        run: npm run build:wasm

      - name: Deploy
        run: npx wrangler deploy -c wrangler.jsonc

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dns-mcp.blackveilsecurity.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS (expected 200)"
          else
            echo "Deployment verified — health check returned 200"
          fi
          python3 scripts/oauth/prod-probe.py --mode=smoke
          python3 scripts/oauth/prod-probe.py --mode=redirect
