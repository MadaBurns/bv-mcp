name: Release

# Triggered by pushing a version tag (e.g., git tag v2.2.0 && git push origin v2.2.0)
# All expressions use controlled inputs (tag name, secrets, job outputs) — no user-supplied text.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build workspace package
        run: npm -w packages/dns-checks run build

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/bv-wasm-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/bv-wasm-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build WASM
        working-directory: crates/bv-wasm-core
        run: wasm-pack build --target web

      - name: Validate internal dependency policy
        run: npm run validate:internal-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high

  version-bump:
    name: Sync version to tag
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - id: extract
        name: Extract version from tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Update package.json version
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Update SERVER_VERSION
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          sed -i "s/export const SERVER_VERSION = '.*'/export const SERVER_VERSION = '$VERSION'/" src/lib/server-version.ts
          grep SERVER_VERSION src/lib/server-version.ts

      - id: changelog
        name: Extract changelog for this version
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          BODY=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release $VERSION"
            echo "::warning::No CHANGELOG entry found for $VERSION"
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # Note: the push below is rejected by `main` branch protection unless
      # the workflow runs under a token with bypass permission (RELEASE_TOKEN).
      # The supported workflow is to pre-bump the version locally before
      # tagging so this step becomes a no-op. See CLAUDE.md "Release workflow".
      - name: Commit version bump if changed
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/lib/server-version.ts
          if git diff --cached --quiet; then
            echo "Version already matches tag"
          else
            git commit -m "chore: auto-bump version to $VERSION [skip ci]"
            git push origin HEAD:main
          fi

  publish-npm:
    name: Publish to npm
    needs: version-bump
    runs-on: ubuntu-latest
    environment: production
    # Gated off while the production `NPM_TOKEN` is being rotated. The hosted
    # token returned 404 on `npm publish` for v2.24.0 (npm reports 404 for
    # auth-shaped misses). Re-enable by deleting this `if:` line once a fresh
    # token with publish rights to both `blackveil-dns` and
    # `@blackveil/dns-checks` is in the production env. Releases are running
    # via the manual fallback in the meantime.
    if: false
    steps:
      - name: Check npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN not configured in production environment"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build workspace package
        run: npm -w packages/dns-checks run build

      - run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @blackveil/dns-checks
        run: npm -w packages/dns-checks publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-cloudflare:
    name: Deploy to Cloudflare Workers
    needs: version-bump
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check Cloudflare token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN not configured in production environment"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build workspace package
        run: npm -w packages/dns-checks run build

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build WASM
        run: npm run build:wasm

      - name: Deploy infra probe
        run: npx wrangler deploy -c wrangler.infra-probe.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy
        run: npx wrangler deploy -c wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify OAuth deployment
        run: |
          python3 scripts/oauth/prod-probe.py --mode=smoke
          python3 scripts/oauth/prod-probe.py --mode=redirect

  github-release:
    name: Create GitHub Release
    needs: version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version-bump.outputs.version }}
          CHANGELOG_BODY: ${{ needs.version-bump.outputs.changelog }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "$CHANGELOG_BODY" \
            --verify-tag

  publish-registry:
    name: Publish to MCP Registry
    needs: [validate, version-bump]
    runs-on: ubuntu-latest
    environment: production
    # Gated off in lockstep with publish-npm. The MCP Registry validates that
    # the npm package version exists before publishing, so this job cascades to
    # `NPM package 'blackveil-dns' not found (status: 404)` whenever npm is
    # stale. Re-enable together with publish-npm once `NPM_TOKEN` is rotated.
    if: false
    steps:
      - name: Check publisher key
        env:
          MCP_PUBLISHER_KEY: ${{ secrets.MCP_PUBLISHER_KEY }}
        run: |
          if [ -z "$MCP_PUBLISHER_KEY" ]; then
            echo "::error::MCP_PUBLISHER_KEY not configured in production environment"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # DNS-based login + publish (com.blackveilsecurity/* namespace requires
      # ed25519 ownership proof at the apex blackveilsecurity.com TXT — see
      # CLAUDE.md "MCP Registry DNS auth"). The previous design used a
      # long-lived JWT in MCP_REGISTRY_TOKEN, which expired silently and went
      # unnoticed because publish.yml warn-and-skipped on missing secrets.
      # `mcp-publisher` is a Go binary distributed via GitHub releases at
      # modelcontextprotocol/registry — NOT an npm package. `npx mcp-publisher`
      # 404s. Pin to a known-good version; bump deliberately.
      - name: Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: '1.7.8'
          MCP_PUBLISHER_SHA256: '48230dbec85bd88a0d42977ef533cddda23235f0db4331b9263ce53b432cb75c'
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          sudo tar -xzf mcp-publisher.tar.gz -C /usr/local/bin mcp-publisher
          rm mcp-publisher.tar.gz
          mcp-publisher --version

      - name: Login + publish to registry
        env:
          MCP_PUBLISHER_KEY: ${{ secrets.MCP_PUBLISHER_KEY }}
        run: |
          mcp-publisher login dns --domain blackveilsecurity.com --private-key "$MCP_PUBLISHER_KEY"
          mcp-publisher publish
