            - generic [ref=e317] [cursor=pointer]: 403 Forbidden during scan
          - generic [ref=e318]:
            - text: If your deployment fails with
            - strong [ref=e319]: “Initialization failed with status 403”
            - text: ", it means your server rejected Smithery’s scan request. Common causes:"
          - list [ref=e320]:
            - listitem [ref=e321]:
              - strong [ref=e322]: WAF or bot protection
              - text: (e.g. Cloudflare Bot Fight Mode) blocking automated requests
            - listitem [ref=e323]:
              - strong [ref=e324]: Server returning 403 for unauthenticated requests
              - text: instead of 401 — per the
              - link "MCP auth spec" [ref=e325] [cursor=pointer]:
                - /url: https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization
              - text: ", servers should return 401 to trigger OAuth discovery"
            - listitem [ref=e326]:
              - strong [ref=e327]: IP-based access restrictions
              - text: or allowlists that don’t include Smithery’s IP range
          - generic [ref=e328]:
            - text: Smithery sends requests with User-Agent
            - code [ref=e329]: SmitheryBot/1.0 (+https://smithery.ai)
            - text: . These requests originate from Cloudflare Workers, which some WAF configurations block by default.
          - 'heading "Navigate to header Option 1: Ensure your server returns 401 (not 403) for OAuth" [level=4] [ref=e330]':
            - link "Navigate to header" [ref=e331] [cursor=pointer]:
