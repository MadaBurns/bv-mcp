<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>dns-security-mcp — Open Source MCP Server for DNS Security</title>
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }
			body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
			.container { max-width: 640px; padding: 2rem; text-align: center; }
			h1 { font-size: 1.8rem; color: #fff; margin-bottom: 0.5rem; }
			.tagline { color: #888; margin-bottom: 2rem; line-height: 1.5; }
			.endpoint { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin: 1.5rem 0; font-family: monospace; font-size: 0.95rem; color: #4ade80; }
			.config { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin: 1.5rem 0; text-align: left; font-family: monospace; font-size: 0.85rem; color: #93c5fd; white-space: pre; overflow-x: auto; }
			a { color: #4ade80; text-decoration: none; }
			a:hover { text-decoration: underline; }
			.links { margin-top: 2rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
			.links a { padding: 0.5rem 1rem; border: 1px solid #333; border-radius: 6px; transition: border-color 0.2s; }
			.links a:hover { border-color: #4ade80; }
		</style>
	</head>
	<body>
		<div class="container">
			<h1>dns-security-mcp</h1>
			<p class="tagline">Open source MCP server for DNS and email security.<br>Scan any domain from Claude, Cursor, or any MCP-compatible AI.</p>
			<div class="endpoint">POST /mcp</div>
			<p style="color:#888; font-size:0.9rem;">Add to Claude Desktop:</p>
			<div class="config">{
  "mcpServers": {
    "dns-security": {
      "url": "https://dns-mcp.blackveilsecurity.com/mcp"
    }
  }
}</div>
			<div class="links">
				<a href="https://github.com/MadaBurns/bv-mcp">GitHub</a>
				<a href="https://blackveil.co.nz">BLACKVEIL</a>
				<a href="/health">Health Check</a>
			</div>
		</div>
	</body>
</html>
